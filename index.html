<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>内容体检</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              brand: "#FF2442",
              "brand-soft": "#FFE9ED",
            },
          },
        },
      };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  </head>
  <body class="bg-slate-50 text-slate-800">
    <div class="mx-auto min-h-screen w-full max-w-[480px] px-4 py-6">
      <header class="mb-5">
        <h1 class="text-2xl font-bold text-brand">内容体检</h1>
        <p class="mt-1 text-sm text-slate-500">输入内容后，一键生成结构化诊断结果。</p>
      </header>

      <section class="rounded-2xl bg-white p-4 shadow-sm">
        <form id="diagnoseForm" class="space-y-3">
          <div>
            <label for="title" class="mb-1 block text-sm font-medium">标题</label>
            <input
              id="title"
              name="title"
              type="text"
              required
              placeholder="输入你的标题"
              class="w-full rounded-xl border border-slate-200 px-3 py-2 text-sm outline-none transition focus:border-brand focus:ring-2 focus:ring-brand-soft"
            />
          </div>
          <div>
            <label for="content" class="mb-1 block text-sm font-medium">正文</label>
            <textarea
              id="content"
              name="content"
              rows="6"
              required
              placeholder="输入你的正文内容"
              class="w-full rounded-xl border border-slate-200 px-3 py-2 text-sm outline-none transition focus:border-brand focus:ring-2 focus:ring-brand-soft"
            ></textarea>
          </div>
          <div>
            <label for="tags" class="mb-1 block text-sm font-medium">标签</label>
            <input
              id="tags"
              name="tags"
              type="text"
              placeholder="例如：#干货 #经验分享"
              class="w-full rounded-xl border border-slate-200 px-3 py-2 text-sm outline-none transition focus:border-brand focus:ring-2 focus:ring-brand-soft"
            />
          </div>
          <button
            id="submitBtn"
            type="submit"
            class="w-full rounded-xl bg-brand px-4 py-2.5 text-sm font-semibold text-white transition active:scale-[0.99] disabled:cursor-not-allowed disabled:opacity-60"
          >
            开始诊断
          </button>
        </form>
      </section>

      <section id="loadingSection" class="mt-4 hidden rounded-2xl bg-white p-4 shadow-sm">
        <div class="animate-pulse space-y-3">
          <div class="h-4 w-24 rounded bg-slate-200"></div>
          <div class="h-20 rounded-xl bg-slate-200"></div>
          <div class="h-40 rounded-xl bg-slate-200"></div>
          <div class="h-16 rounded-xl bg-slate-200"></div>
        </div>
      </section>

      <section
        id="errorSection"
        class="mt-4 hidden rounded-2xl border border-red-200 bg-red-50 p-4 text-sm text-red-600"
      ></section>

      <section id="resultSection" class="mt-4 hidden space-y-4">
        <div class="rounded-2xl bg-white p-4 shadow-sm">
          <div class="mb-3 flex items-center justify-between">
            <h2 class="text-base font-semibold">诊断结果</h2>
            <span
              id="categoryBadge"
              class="rounded-full bg-brand-soft px-3 py-1 text-xs font-semibold text-brand"
            ></span>
          </div>
          <div class="flex items-center gap-4">
            <div class="relative h-24 w-24">
              <svg class="h-24 w-24 -rotate-90" viewBox="0 0 120 120">
                <circle cx="60" cy="60" r="52" stroke="#E2E8F0" stroke-width="10" fill="none"></circle>
                <circle
                  id="scoreProgress"
                  cx="60"
                  cy="60"
                  r="52"
                  stroke="#FF2442"
                  stroke-width="10"
                  stroke-linecap="round"
                  fill="none"
                  stroke-dasharray="326.73"
                  stroke-dashoffset="326.73"
                ></circle>
              </svg>
              <div class="absolute inset-0 flex items-center justify-center">
                <span id="totalScoreText" class="text-xl font-bold text-brand">0</span>
              </div>
            </div>
            <div class="text-sm text-slate-500">
              <p>总分（满分 100）</p>
              <p class="mt-1 text-xs">综合四个维度生成诊断结果</p>
            </div>
          </div>
        </div>

        <div class="rounded-2xl bg-white p-4 shadow-sm">
          <h3 class="mb-3 text-sm font-semibold">四维雷达图</h3>
          <canvas id="radarChart" height="220"></canvas>
        </div>

        <div class="rounded-2xl bg-white p-4 shadow-sm">
          <h3 class="mb-3 text-sm font-semibold">优化建议</h3>
          <div id="suggestionsList" class="space-y-2"></div>
        </div>

        <div class="rounded-2xl bg-white p-4 shadow-sm">
          <h3 class="mb-3 text-sm font-semibold">标题对比</h3>
          <div class="space-y-2 text-sm">
            <div class="rounded-xl border border-slate-200 bg-slate-50 p-3">
              <p class="mb-1 text-xs text-slate-500">原标题</p>
              <p id="originalTitle" class="text-slate-700"></p>
            </div>
            <div class="rounded-xl border border-brand/20 bg-brand-soft p-3">
              <p class="mb-1 text-xs text-slate-500">优化标题</p>
              <p id="rewriteTitle" class="text-slate-700"></p>
            </div>
          </div>
        </div>
      </section>
    </div>

    <script>
      const form = document.getElementById("diagnoseForm");
      const submitBtn = document.getElementById("submitBtn");
      const loadingSection = document.getElementById("loadingSection");
      const resultSection = document.getElementById("resultSection");
      const errorSection = document.getElementById("errorSection");
      const categoryBadge = document.getElementById("categoryBadge");
      const totalScoreText = document.getElementById("totalScoreText");
      const scoreProgress = document.getElementById("scoreProgress");
      const suggestionsList = document.getElementById("suggestionsList");
      const originalTitle = document.getElementById("originalTitle");
      const rewriteTitle = document.getElementById("rewriteTitle");
      const circumference = 2 * Math.PI * 52;
      let radarChart = null;

      function setLoading(loading) {
        submitBtn.disabled = loading;
        submitBtn.textContent = loading ? "诊断中..." : "开始诊断";
        loadingSection.classList.toggle("hidden", !loading);
      }

      function setError(message) {
        errorSection.textContent = message;
        errorSection.classList.remove("hidden");
      }

      function clearError() {
        errorSection.classList.add("hidden");
        errorSection.textContent = "";
      }

      function drawRadar(scores) {
        const ctx = document.getElementById("radarChart").getContext("2d");
        if (radarChart) radarChart.destroy();
        radarChart = new Chart(ctx, {
          type: "radar",
          data: {
            labels: ["标题结构", "开头钩子", "信息密度", "互动引导"],
            datasets: [
              {
                label: "维度评分",
                data: [scores.title, scores.hook, scores.density, scores.engagement],
                backgroundColor: "rgba(255, 36, 66, 0.2)",
                borderColor: "#FF2442",
                pointBackgroundColor: "#FF2442",
                pointBorderColor: "#fff",
              },
            ],
          },
          options: {
            responsive: true,
            plugins: { legend: { display: false } },
            scales: {
              r: {
                min: 0,
                max: 100,
                ticks: {
                  stepSize: 20,
                  backdropColor: "transparent",
                },
              },
            },
          },
        });
      }

      function renderSuggestions(suggestions) {
        suggestionsList.innerHTML = "";
        const safeList = Array.isArray(suggestions) ? suggestions.slice(0, 3) : [];
        if (safeList.length === 0) {
          const fallback = document.createElement("div");
          fallback.className = "rounded-xl border border-slate-100 bg-slate-50 p-3 text-sm";
          fallback.textContent = "暂未生成建议，请稍后再试。";
          suggestionsList.appendChild(fallback);
          return;
        }
        safeList.forEach((item, index) => {
          const card = document.createElement("div");
          card.className = "rounded-xl border border-slate-100 bg-slate-50 p-3 text-sm";
          card.textContent = `${index + 1}. ${item}`;
          suggestionsList.appendChild(card);
        });
      }

      function renderResult(result, inputTitle) {
        const totalScore = Math.max(0, Math.min(100, Number(result.total_score) || 0));
        const progress = circumference * (1 - totalScore / 100);
        const scores = result.scores || {};

        categoryBadge.textContent = result.category || "未分类";
        totalScoreText.textContent = String(totalScore);
        scoreProgress.style.strokeDasharray = `${circumference}`;
        scoreProgress.style.strokeDashoffset = `${progress}`;

        drawRadar({
          title: Number(scores.title) || 0,
          hook: Number(scores.hook) || 0,
          density: Number(scores.density) || 0,
          engagement: Number(scores.engagement) || 0,
        });
        renderSuggestions(result.suggestions);
        originalTitle.textContent = inputTitle || "未提供";
        rewriteTitle.textContent = result.rewrite_title || "暂无优化标题";
        resultSection.classList.remove("hidden");
      }

      form.addEventListener("submit", async (e) => {
        e.preventDefault();
        clearError();
        resultSection.classList.add("hidden");

        const formData = new FormData(form);
        const payload = {
          title: String(formData.get("title") || "").trim(),
          content: String(formData.get("content") || "").trim(),
          tags: String(formData.get("tags") || "").trim(),
        };

        if (payload.content.length < 30) {
          setError("内容太少，建议至少输入50字以上才能获得准确诊断");
          return;
        }

        setLoading(true);

        try {
          const resp = await fetch("/api/diagnose", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(payload),
          });

          const data = await resp.json();
          if (!resp.ok) {
            throw new Error(data.error || "诊断失败，请稍后重试。");
          }
          renderResult(data, payload.title);
        } catch (err) {
          setError(err.message || "网络异常，请检查连接后重试。");
        } finally {
          setLoading(false);
        }
      });
    </script>
  </body>
</html>
